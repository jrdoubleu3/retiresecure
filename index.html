<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Savings Simplified</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Retirement Savings Simplified</h1>
        <p>Automated savings, professional management, no employer required.</p>
    </header>
    <main>
        <section>
            <h2>Join the Waitlist</h2>
            <form action="https://your-form-endpoint.com" method="POST">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Sign Up</button>
            </form>
        </section>
        <section class="calculator">
            <h2>Retirement Calculator</h2>
            <label for="hours">Hours Worked Per Week:</label>
            <input type="number" id="hours" required>
            <label for="rate">Contribution Rate ($/hour):</label>
            <input type="number" id="rate" required>
            <label for="age">Your Age:</label>
            <input type="number" id="age" required>
            <button id="calculate-button">Calculate</button>
            <p id="result"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Retirement Simplified. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
